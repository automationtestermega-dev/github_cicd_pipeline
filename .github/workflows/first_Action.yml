name: Deploy Project
on: push 
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install dependencies
        run : npm ci
      - name: Run Tests
        run : npm test
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install dependencies
        run : npm ci
      - name: Build Project
        run : npm run build 
      - name: deploy
        run: echo "Deploying" 
        
